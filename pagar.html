<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tribu GPS — Pagar cuota</title>
<script src="https://checkout.epayco.co/checkout-v2.js"></script>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #000000;
    color: #F4F2EE;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    text-align: center;
  }
  .box { max-width: 380px; padding: 24px; }
  .brand {
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 4px;
    color: #F4F2EE;
    text-transform: uppercase;
  }
  .tagline {
    font-family: monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: #E09018;
    text-transform: uppercase;
    margin-top: 4px;
    margin-bottom: 24px;
  }
  #status { color: #888880; font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>
  <div class="box">
    <div class="brand">Tribu GPS</div>
    <div class="tagline">Motor Fintech</div>
    <p id="status">Abriendo tu pago seguro...</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session');
    const statusEl = document.getElementById('status');

    // Cambia a false cuando ePayco confirme que tu cuenta ya esta en modo produccion
    const MODO_PRUEBAS = true;

    if (!sessionId) {
      statusEl.textContent = 'Enlace de pago invalido o incompleto. Contacta a Tribu GPS.';
    } else {
      const checkout = ePayco.checkout.configure({
        sessionId: sessionId,
        type: 'onpage',
        test: MODO_PRUEBAS
      });

      checkout.setHooks({
        onCreated: () => {
          statusEl.textContent = 'Completa tu pago en la ventana que se abrió.';
        },
        onResponse: (response) => {
          statusEl.textContent = 'Pago procesado. Ya puedes cerrar esta ventana.';
        },
        onErrors: (error) => {
          statusEl.textContent = 'Hubo un error al procesar el pago. Intenta de nuevo o contacta a Tribu GPS.';
        },
        onClosed: () => {
          // El usuario cerró el checkout; no se requiere accion aqui.
        }
      });

      checkout.open();
    }
  </script>
</body>
</html>
