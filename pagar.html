<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tribu GPS — Pagar cuota</title>
<script src="https://checkout.epayco.co/checkout-v2.js"></script>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #000000;
    color: #F4F2EE;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    text-align: center;
  }
  .box { max-width: 380px; padding: 24px; }
  .brand {
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 4px;
    color: #F4F2EE;
    text-transform: uppercase;
  }
  .tagline {
    font-family: monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: #E09018;
    text-transform: uppercase;
    margin-top: 4px;
    margin-bottom: 24px;
  }
  #status { color: #888880; font-size: 14px; line-height: 1.6; }
  #btnPortal {
    display: none;
    margin-top: 24px;
    padding: 12px 28px;
    background: #E09018;
    color: #0C0C0C;
    font-weight: bold;
    font-size: 13px;
    text-decoration: none;
    border-radius: 8px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="box">
    <div class="brand">Tribu GPS</div>
    <div class="tagline">Motor Fintech</div>
    <p id="status">Abriendo tu pago seguro...</p>
    <a id="btnPortal" href="https://tribu-gps-portal.vercel.app/index.html">Ir al portal de pagos</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session');
    const refPayco = params.get('ref_payco');
    const statusEl = document.getElementById('status');

    // Cambia a false cuando ePayco confirme que tu cuenta ya esta en modo produccion
    const MODO_PRUEBAS = true;

    if (sessionId) {
      // Caso 1: llegada inicial con ?session=... -> abrir el checkout
      const checkout = ePayco.checkout.configure({
        sessionId: sessionId,
        type: 'onpage',
        test: MODO_PRUEBAS
      });

      checkout.setHooks({
        onCreated: () => {
          statusEl.textContent = 'Completa tu pago en la ventana que se abrió.';
        },
        onResponse: (response) => {
          statusEl.textContent = 'Pago procesado. Ya puedes cerrar esta ventana.';
        },
        onErrors: (error) => {
          statusEl.textContent = 'Hubo un error al procesar el pago. Intenta de nuevo o contacta a Tribu GPS.';
        },
        onClosed: () => {
          // El usuario cerro el checkout; no se requiere accion aqui.
        }
      });

      checkout.open();

    } else if (refPayco) {
      // Caso 2: ePayco redirige de vuelta aqui despues de completar el pago,
      // con ?ref_payco=... en vez de ?session=...
      // OJO: esta pagina es solo para mostrarle algo al cliente. La
      // confirmacion REAL y definitiva del pago siempre llega por el
      // webhook (WH1 en n8n), no desde aqui — por eso el mensaje es
      // deliberadamente prudente y nunca dice "no se pago" con certeza.
      statusEl.textContent = 'Confirmando tu pago, un momento...';

      // Reemplaza esta URL por la Production URL real de tu nodo
      // "CP1. Recibir Consulta de Pago" en n8n (mismo procedimiento que
      // usaste para IP1 y WH1: abrir el nodo -> copiar Production URL).
      const URL_CONSULTA_PAGO = 'https://tribugps.pikapod.net/webhook/consultar-pago';

      fetch(URL_CONSULTA_PAGO + '?ref_payco=' + encodeURIComponent(refPayco))
        .then(r => r.json())
        .then(data => {
          console.log('Respuesta de consulta de pago (via n8n):', data);
          const respuesta = data && data.respuesta;

          if (respuesta === 'Aceptada') {
            statusEl.textContent = 'Tu pago fue aprobado. En unos minutos recibirás la confirmación por WhatsApp.';
          } else if (respuesta === 'Pendiente') {
            statusEl.textContent = 'Tu pago está pendiente de confirmación. Te avisaremos por WhatsApp en cuanto se confirme.';
          } else if (respuesta === 'Rechazada' || respuesta === 'Fallida') {
            statusEl.textContent = 'Tu pago no pudo procesarse. Intenta de nuevo o contacta a Tribu GPS.';
          } else {
            statusEl.textContent = 'Tu pago está siendo confirmado. Recibirás un mensaje de WhatsApp en cuanto se verifique.';
          }
          document.getElementById('btnPortal').style.display = 'inline-block';
        })
        .catch(() => {
          // Si esta consulta falla, no asumimos que el pago fallo —
          // el webhook (WH1) es la fuente real de la confirmacion.
          statusEl.textContent = 'Tu pago está siendo confirmado. Recibirás un mensaje de WhatsApp en cuanto se verifique.';
          document.getElementById('btnPortal').style.display = 'inline-block';
        });

    } else {
      statusEl.textContent = 'Enlace de pago invalido o incompleto. Contacta a Tribu GPS.';
    }
  </script>
</body>
</html>
